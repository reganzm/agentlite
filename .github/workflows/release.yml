name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: darwin-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.92
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/agentlite.exe" \
              "dist/agentlite-${{ matrix.suffix }}.exe"
          else
            cp "target/${{ matrix.target }}/release/agentlite" \
              "dist/agentlite-${{ matrix.suffix }}"
            chmod +x "dist/agentlite-${{ matrix.suffix }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.suffix }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: binary-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
